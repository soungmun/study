# === Mail (Naver / Gmail 둘 다 지원, 환경변수로 전환) ===
# 기본값: 네이버 SMTP. Gmail로 전환하려면 아래 환경변수 사용:
#   $env:MAIL_HOST="smtp.gmail.com"
#   $env:MAIL_PORT="587"
#   $env:MAIL_SSL_ENABLE="false"
#   $env:MAIL_STARTTLS="true"
#   $env:MAIL_USERNAME="<your>@gmail.com"
#   $env:MAIL_PASSWORD="<gmail 앱 비밀번호 16자>"
# 네이버는 환경설정 → POP3/IMAP에서 "SMTP 사용함" 체크 + 로그인 비밀번호 사용
spring.mail.host=${MAIL_HOST:smtp.naver.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:smjo15@naver.com}
spring.mail.password=${MAIL_PASSWORD:CHANGE_ME}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.naver.com}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_USERNAME:smjo15@naver.com}
app.mail.from-name=Study Notice

# 관리자 username (이 username 으로 로그인한 사용자만 단체 메일 발송 가능)
app.admin.username=${ADMIN_USERNAME:test11}
# 관리자 토큰 (X-Admin-Token 헤더로 admin 인증 우회 — 개발/스크립트용)
app.admin.token=${ADMIN_TOKEN:DEV_ADMIN_TOKEN}

