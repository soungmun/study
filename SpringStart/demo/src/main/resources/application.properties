# 기본 앱 설정
spring.application.name=demo
server.port=8080
server.tomcat.max-http-header-size=65536

# DB 연동 설정 (MariaDB / MySQL 공용)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# 만약 MySQL 드라이버를 사용하신다면: com.mysql.cj.jdbc.Driver

# DB URL: notice 데이터베이스에 연결
spring.datasource.url=jdbc:mariadb://localhost:3306/notice?useSSL=false&characterEncoding=UTF-8&serverTimezone=UTC

# 계정 정보
spring.datasource.username=root
spring.datasource.password=root

# JPA/Hibernate 설정 (테이블 구조 유지 및 로그 출력)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# LocalDateTime ISO 직렬화 설정은 JacksonConfig 클래스에서 처리

# 카카오 OAuth2 로그인 설정
spring.security.oauth2.client.registration.kakao.client-id=98c96427d8cbca18d66c6544b829a271
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=none

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id